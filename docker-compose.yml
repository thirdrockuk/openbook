version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: openbook
      POSTGRES_PASSWORD: openbook
      POSTGRES_DB: openbook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://openbook:openbook@db:5432/openbook
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      RESEND_API_KEY: "re_drEs3m2c_KsBVPZ7nPjFBo6UyRKHKjxtw"
      EMAIL_FROM_ADDRESS: openbook@example.com
      EMAIL_FROM_NAME: OpenBook
      APP_URL: http://localhost:5173
      ENVIRONMENT: development
      STRIPE_SECRET_KEY: "sk_test_xxx"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_STRIPE_PUBLISHABLE_KEY: "pk_test_xxx"

volumes:
  postgres_data:
